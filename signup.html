<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Create account · Garden</title>
<link rel="stylesheet" href="css/styles.css">
<style>
  .auth-wrap{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;}
  .auth-card{width:100%; max-width:400px; padding:42px 36px; text-align:center;}
  .auth-card .mark{font-family:var(--serif); font-size:1.4rem; color:var(--rose-soft); margin-bottom:6px;}
  .auth-card h1{font-size:2rem; margin:0 0 6px;}
  .auth-card .sub{font-size:.88rem; margin-bottom:28px;}
  form{text-align:left; display:flex; flex-direction:column; gap:16px;}
  .auth-card .btn-primary{width:100%; justify-content:center; padding:14px;}
  .divider{display:flex; align-items:center; gap:12px; margin:22px 0; color:var(--ink-dim); font-size:.78rem;}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line);}
  .google-btn{width:100%; justify-content:center; padding:13px;}
  .switch{margin-top:24px; font-size:.85rem; color:var(--ink-dim);}
  .switch a{color:var(--rose-soft); text-decoration:none; border-bottom:1px solid currentColor;}
  .err{font-size:.8rem; color:#e3a193; min-height:1.2em;}
  .hint{font-size:.74rem; color:var(--ink-dim); margin-top:4px;}
</style>
</head>
<body>
<div class="canopy-bg"></div>
<div class="auth-wrap">
  <div class="auth-card card-panel">
    <div class="mark">🌿 Garden</div>
    <h1>Plant an account</h1>
    <p class="sub">A few seeds of info to get started.</p>

    <form id="signupForm">
      <div>
        <label for="name">Your name</label>
        <input type="text" id="name" required autocomplete="name" placeholder="Someo">
      </div>
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="email" placeholder="you@example.com">
      </div>
      <div>
        <label for="phone">Phone number</label>
        <input type="tel" id="phone" required autocomplete="tel" placeholder="+1 555 123 4567">
      </div>
      <div>
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="new-password" placeholder="••••••••" minlength="6">
        <div class="hint">At least 6 characters.</div>
      </div>
      <div class="err" id="err"></div>
      <button type="submit" class="btn btn-primary" id="submitBtn">Create account</button>
    </form>

    <p class="switch">Already planted? <a href="login.html">Sign in</a></p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script>
  redirectIfSignedIn();

  document.getElementById('signupForm').addEventListener('submit', e => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const err = document.getElementById('err');
    err.textContent = '';
    setButtonLoading(btn, true, 'Creating');
    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const email = document.getElementById('email').value.trim();
    auth.createUserWithEmailAndPassword(email, document.getElementById('password').value)
     .then(cred => {
        return cred.user.updateProfile({ displayName: name }).then(() =>
          db.collection('users').doc(cred.user.uid).set({
            name, email, phone,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          })
        );
     })
     .then(() => window.location.href = 'index.html')
     .catch(e => { err.textContent = authErrorMessage(e); setButtonLoading(btn, false, 'Create account'); });
  });
</script>
</body>
</html>
